# MemoriaKids - Nginx リバースプロキシ設定

# レート制限ゾーンの定義
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

# アップストリーム定義
upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream backend {
    server backend:8787;
    keepalive 32;
}

upstream ai_service {
    server ai-service:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # SSL設定のプレースホルダー（本番環境では以下を有効化）
    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # HTTPSリダイレクト（本番環境では有効化）
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }

    # セキュリティヘッダー
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # HSTS（本番環境でSSL有効化後に設定）
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # リクエストボディサイズ制限（写真アップロード用に大きめに設定）
    client_max_body_size 20M;

    # gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # バックエンドAPI
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        # /api/ プレフィックスを除去してバックエンドに転送
        rewrite ^/api/(.*) /$1 break;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # タイムアウト設定
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # AI顔認識サービス
    location /ai/ {
        limit_req zone=ai_limit burst=10 nodelay;

        # /ai/ プレフィックスを除去してAIサービスに転送
        rewrite ^/ai/(.*) /$1 break;

        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # AI処理は時間がかかる可能性があるためタイムアウトを長めに設定
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # アップロードサイズ（顔画像用）
        client_max_body_size 10M;
    }

    # ヘルスチェック（ロードバランサー用）
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # フロントエンド（デフォルト）
    location / {
        limit_req zone=general_limit burst=30 nodelay;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 静的アセットのキャッシュ設定
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
