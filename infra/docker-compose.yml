# MemoriaKids - Docker Compose 構成
# 全サービスを一括で起動するための設定

services:
  # PostgreSQL データベース
  postgres:
    image: postgres:16-alpine
    container_name: memoria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memoria_kids
      POSTGRES_USER: memoria
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoria_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoria -d memoria_kids"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoria-network

  # Redis キャッシュ・キュー
  redis:
    image: redis:7-alpine
    container_name: memoria-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoria-network

  # MinIO オブジェクトストレージ（写真・動画保存用）
  minio:
    image: minio/minio:latest
    container_name: memoria-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # コンソール
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoria-network

  # バックエンド API (Node.js / Hono)
  backend:
    container_name: memoria-backend
    build:
      context: ../
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://memoria:${POSTGRES_PASSWORD:-memoria_dev_password}@postgres:5432/memoria_kids
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8787/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - memoria-network

  # フロントエンド (Next.js)
  frontend:
    container_name: memoria-frontend
    build:
      context: ../
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_AI_SERVICE_URL: /ai
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - memoria-network

  # AI 顔認識サービス (Python + GPU)
  ai-service:
    container_name: memoria-ai-service
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_NAME: buffalo_l
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    # GPU が利用可能な場合のみ有効化
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - memoria-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

networks:
  memoria-network:
    driver: bridge
